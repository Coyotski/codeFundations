<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <fieldset>
        <legend>Datos Personales</legend>
        <form action="/submit" method="post">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required 
            pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"
            title="Solo letras y espacios"><br><br>

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" required
            min="0" max="120" title="Introduce una edad válida"><br><br>

            <label for="genero">Género:</label>
            <select id="genero" name="genero" required><br><br>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
                <option value="prefiero_no_decirlo">Prefiero no decirlo</option>
                
            </select>
        </fieldset>
        <fieldset>
            <legend>Preguntas</legend>
            <p>¿Cuál es tu sistema operativo favorito?</p>
           <label><input type="radio" name="Os" value="Windows" required> Windows</label><br>
           <label><input type="radio" name="Os" value="macOS" required> macOS</label><br>
           <label><input type="radio" name="Os" value="Linux" required> Linux</label><br>
           <label><input type="radio" name="Os" value="Otro" required> Otro</label><br><br>
        </fieldset>
        <fieldset>
            <legend>Habilidades Técnicas</legend>  
           <p>¿Qué tecnologías utilizas?</p>
              <label><input type="checkbox" name="tecnologias" value="HTML" required> HTML</label><br>
              <label><input type="checkbox" name="tecnologias" value="CSS" required> CSS</label><br>
              <label><input type="checkbox" name="tecnologias" value="JavaScript" required> JavaScript</label><br>
              <label><input type="checkbox" name="tecnologias" value="Otro" required> Otro</label><br>
            
        </fieldset>
        <fieldset>
            <legend>Comentarios finales</legend>
            <label for="comentarios">Escribe tus comentarios aquí:</label><br>
            <textarea id="comentarios" name="comentarios" rows="5" ></textarea><br><br>
            <button type="submit">Enviar</button>
        </form>
    </fieldset>
</body>
</html>
